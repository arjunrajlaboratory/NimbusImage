name: "Calculate Blob Metrics"
entryPoint: datasetview
popular: true
category: Measurements
steps:
  - id: welcome-tourstep
    route: datasetview
    title: "Calculate Blob Metrics"
    text: "This tour will guide you through the process of calculating blob metrics, like area, perimeter, and eccentricity."
    modalOverlay: true
    showNextButton: true

  - id: object-list-button-tourstep
    route: datasetview
    element: '[data-tour="object-list-button"]'
    title: "Object List"
    text: "Click here to open the object list."
    position: "right"
    waitForElement: 1000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "object-list-button"

  # Measure flow: gated on the relevant UI appearing. The property-creation
  # controls live in the "measure" dialog, so the user opens it first
  # (interactive), then we walk the dialog's controls.
  - id: measure-objects-tourstep
    route: datasetview
    element: '[data-tour="measure-objects"]'
    title: "Measure your objects"
    text: "Properties are measurements of objects — like a blob's area or perimeter. Click the ruler to open the measurement panel."
    position: "bottom"
    waitForElement: 2000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "measure-objects"

  # Overview of the whole (large, centered) measure dialog — a centered modal
  # popover reads better here than an arrow pointing at one corner of it.
  - id: create-property-header-tourstep
    route: datasetview
    title: "The measurement panel"
    text: "This is where you define a property to calculate. Let's set one up."
    waitForElement: 5000
    modalOverlay: true
    showNextButton: true

  - id: property-tag-picker-tourstep
    route: datasetview
    element: '[data-tour="property-tag-picker"]'
    title: "Choose objects to measure"
    text: "Pick the tag selecting the objects to measure. Choose something that is a 'blob', then click Next."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: property-shape-select-tourstep
    route: datasetview
    element: '[data-tour="shape-selection"]'
    title: "Choose a shape"
    text: "Select a shape to measure (for example, a polygon), then click Next."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: property-algorithm-select-tourstep
    route: datasetview
    element: '[data-tour="property-algorithm-select"]'
    title: "What to measure"
    text: "Pick the algorithm to calculate the property. Choose 'Blob metrics' — area, perimeter, eccentricity, and more."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: create-property-button-tourstep
    route: datasetview
    element: '[data-tour="create-property-button"]'
    title: "Create the property"
    text: "Click 'Create Property'. The computation starts automatically."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: false
    onTriggerEvent: "create-property-button"

  - id: properties-content-tourstep
    route: datasetview
    element: '[data-tour="properties-content"]'
    title: "Your computed properties"
    text: "The property you just created appears here once it's done computing — expand it to see values like area, perimeter, and eccentricity."
    position: "left"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true
