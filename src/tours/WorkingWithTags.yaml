name: "Working with Tags"
entryPoint: datasetview
popular: false
category: Introduction
steps:
  # The tag picker lives in the tool-creation panel, so open it interactively
  # first (open tool browser -> pick a tool type) before pointing at the tags.
  - id: add-tool-tourstep
    route: datasetview
    element: '[data-tour="add-tool"]'
    title: "Working with tags"
    text: "Tags label and organize your objects. Let's see where you set them — click 'Add new tool' to open the tool browser."
    position: "right"
    waitForElement: 2000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "add-tool"

  - id: blob-type-tourstep
    route: datasetview
    element: '[data-tour="blob"]'
    title: "Pick a tool type"
    text: "Choose the 'Blob' tool to configure it."
    position: "right"
    waitForElement: 5000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "blob"

  - id: tag-picker-tourstep
    route: datasetview
    element: '[data-tour="tool-creation-tag-picker"]'
    title: "Tagging"
    text: "Tags label the objects this tool creates. Every object can have one or more tags — a flexible way to organize your data and analyses. You choose which tags to show and which to quantify."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true
