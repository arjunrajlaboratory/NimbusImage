name: "Add first object creation tool"
entryPoint: datasetview
popular: true
category: Tools
steps:
  # Interactive gating: the tool browser + its config controls only exist after
  # the user opens it, so each step waits for the relevant action.
  - id: add-tool-tourstep
    route: datasetview
    element: '[data-tour="add-tool"]'
    title: "Add a tool"
    text: "Tools let you create and analyze objects. Click 'Add new tool' to open the tool browser."
    position: "right"
    waitForElement: 2000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "add-tool"

  - id: gaussian-blur-tourstep
    route: datasetview
    element: '[data-tour="gaussian-blur"]'
    title: "Pick a tool type"
    text: "Choose the 'Gaussian blur' tool — it blurs the image. Click it to configure it."
    position: "right"
    waitForElement: 5000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "gaussian-blur"

  - id: sigma-tourstep
    route: datasetview
    element: '[data-tour="sigma"]'
    title: "Sigma"
    text: "Sigma controls how much the image is blurred. Adjust it, then click Next."
    position: "bottom"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: parent-tourstep
    route: datasetview
    element: '[data-tour="parent-tag"]'
    title: "Parent tag"
    text: "The parent tag lets you set which annotations are the parents of others. Click Next when ready."
    position: "bottom"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true
