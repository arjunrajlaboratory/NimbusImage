name: Welcome to NimbusImage!
entryPoint: root
popular: true
category: Upload
options:
  modalOverlay: true
steps:
  - id: Welcome
    route: root
    title: "Welcome to NimbusImage"
    text: "Let's get you going with a sample dataset!"
    position: "bottom"
    waitForElement: 1000  # 1 second timeout

  - id: try-sample-dataset
    route: root
    element: '[data-tour="try-sample-dataset"]'
    title: "Try a Sample Dataset"
    text: "Let's use a sample dataset. Click here to pull up some samples."
    position: "bottom"
    onTriggerEvent: "try-sample-dataset"
    waitForElement: 3000
    showNextButton: false

  - id: my-first-dataset
    route: root
    element: '[data-tour="my-first-nimbus-dataset"]'
    title: "Import sample dataset"
    text: "This is a sample dataset that you can use to get started."
    position: "bottom"
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "my-first-nimbus-dataset"
    waitForElement: 3000

  - id: zenodo-importer-import-dataset
    route: root
    element: '[data-tour="zenodo-importer-import-dataset"]'
    title: "Start the import"
    text: "Click the 'Import Dataset' button to start the import. Then hold tight while the dataset is imported and set up for you."
    position: "top"
    waitForElement: 1000
    showNextButton: false
    onTriggerEvent: "zenodo-importer-import-dataset"

  - id: welcome-tourstep
    route: datasetview
    title: "Welcome to your new dataset!"
    text: "This is the NimbusImage Viewer. You can view and analyze your datasets here."
    position: "bottom"
    waitForElement: 5000
    modalOverlay: true
    showNextButton: true

  - id: zoom-instruction-tourstep
    route: datasetview
    title: "Zooming"
    text: "Use your mouse wheel or trackpad to zoom in and out of the image."
    position: "left"
    modalOverlay: false

  - id: pan-instruction-tourstep
    route: datasetview
    title: "Panning the Image"
    text: "Click and drag anywhere on the image to pan around."
    position: "left"
    modalOverlay: false
    waitForElement: 1000

  - id: contrast-palette-tourstep
    route: datasetview
    element: '[data-tour="layer-info"]'
    title: "Contrast settings"
    text: "Click here to adjust contrast settings for each layer."
    position: "left"
    modalOverlay: false
    waitForElement: 1000

  - id: help-button-tourstep
    route: datasetview
    element: '[data-tour="help-button"]'
    title: "Help"
    text: "Click here for documentation and tours."
    position: "bottom"
    modalOverlay: true
    waitForElement: 1000

  - id: chat-button-tourstep
    route: datasetview
    element: '[data-tour="chat-button"]'
    title: "Chatbot"
    text: "Click here for the NimbusImage chatbot. It uses AI to 'see' the image and help guide you through the analysis."
    position: "bottom"
    modalOverlay: true
    waitForElement: 1000

  - id: analysis-tourstep
    route: datasetview
    title: "Analysis"
    text: "Let's try analyzing the image. Analysis begins by finding objects in the image."
    position: "bottom"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: nucleus
    route: datasetview
    element: '[data-tour="nucleus"]'
    title: "Click here to activate the nucleus tool"
    text: "Using this tool, you can manually draw nuclei on the image for further analysis. There are many other automated tools available for making objects as well."
    position: "right"
    waitForElement: 5000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "nucleus"

  - id: draw-nuclei-tourstep
    route: datasetview
    title: "Draw a few nuclei"
    text: "Click and drag to draw a few nuclei on the image."
    position: "bottom"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: object-list-button-tourstep
    route: datasetview
    element: '[data-tour="object-list-button"]'
    title: "Object List"
    text: "Click here to open the object list."
    position: "right"
    waitForElement: 1000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "object-list-button"

  # Measure flow: each step is gated on the relevant UI actually appearing.
  # The property-creation controls live inside the "measure" dialog, so we first
  # have the user open it (interactive trigger), then walk the dialog's controls.
  - id: measure-objects-tourstep
    route: datasetview
    element: '[data-tour="measure-objects"]'
    title: "Measure your objects"
    text: "Properties are measurements of objects — like the area or perimeter of a nucleus. Click the ruler to open the measurement panel."
    position: "bottom"
    waitForElement: 2000
    modalOverlay: true
    showNextButton: false
    onTriggerEvent: "measure-objects"

  # Overview of the whole (large, centered) measure dialog — a centered modal
  # popover reads better here than an arrow pointing at one corner of it.
  - id: create-property-header-tourstep
    route: datasetview
    title: "The measurement panel"
    text: "This is where you define a property to calculate. Let's set one up."
    waitForElement: 5000
    modalOverlay: true
    showNextButton: true

  - id: property-tag-picker-tourstep
    route: datasetview
    element: '[data-tour="property-tag-picker"]'
    title: "Choose objects to measure"
    text: "Pick the tag selecting the objects to measure. For now, choose 'nucleus', then click Next."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: property-shape-select-tourstep
    route: datasetview
    element: '[data-tour="shape-selection"]'
    title: "Choose a shape"
    text: "Select a shape to measure (for example, a polygon), then click Next."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: property-algorithm-select-tourstep
    route: datasetview
    element: '[data-tour="property-algorithm-select"]'
    title: "What to measure"
    text: "Choose 'Blob metrics' — things like area and perimeter."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: create-property-button-tourstep
    route: datasetview
    element: '[data-tour="create-property-button"]'
    title: "Create the property"
    text: "Click 'Create Property'. The computation starts automatically."
    position: "right"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: false
    onTriggerEvent: "create-property-button"

  - id: properties-content-tourstep
    route: datasetview
    element: '[data-tour="properties-content"]'
    title: "Your computed properties"
    text: "The property you just created appears here once it's done computing — expand it to see values like area, perimeter, and eccentricity."
    position: "left"
    waitForElement: 5000
    modalOverlay: false
    showNextButton: true

  - id: end-tour-tourstep
    route: datasetview
    title: "Made it!"
    text: "Thanks for taking the tour! Enjoy using NimbusImage!"
    position: "bottom"
    waitForElement: 2000
    showNextButton: true
